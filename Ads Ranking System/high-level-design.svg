<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 10; }
      .service { fill: #eff6ff; stroke: #2563eb; }
      .store { fill: #fff7ed; stroke: #ea580c; }
      .event { fill: #f0fdf4; stroke: #16a34a; }
      .ml { fill: #f5f3ff; stroke: #7c3aed; }
      .label { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .tiny { font: 12px Arial, sans-serif; fill: #475569; }
      .section { font: 700 18px Arial, sans-serif; fill: #1e293b; }
      .arrow { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="980" fill="#f8fafc"/>
  <text x="48" y="52" class="title">Ads Ranking System - High-Level Design</text>
  <text x="48" y="78" class="subtitle">Whiteboard-friendly architecture: online serving path, supporting stores, event feedback loop, and offline ML/reporting.</text>

  <rect x="40" y="110" width="1420" height="390" class="group"/>
  <text x="62" y="140" class="section">Online Serving</text>

  <rect x="72" y="175" width="150" height="76" class="box service"/>
  <text x="147" y="206" text-anchor="middle" class="label">Client</text>
  <text x="147" y="229" text-anchor="middle" class="small">app / web</text>

  <rect x="272" y="175" width="160" height="76" class="box service"/>
  <text x="352" y="206" text-anchor="middle" class="label">Ads Gateway</text>
  <text x="352" y="229" text-anchor="middle" class="small">auth, rate limit</text>

  <rect x="482" y="175" width="210" height="76" class="box service"/>
  <text x="587" y="206" text-anchor="middle" class="label">Ad Serving</text>
  <text x="587" y="229" text-anchor="middle" class="small">orchestrator</text>

  <rect x="772" y="138" width="190" height="68" class="box service"/>
  <text x="867" y="165" text-anchor="middle" class="label">Eligibility</text>
  <text x="867" y="187" text-anchor="middle" class="small">policy, budget, privacy</text>

  <rect x="772" y="228" width="190" height="68" class="box service"/>
  <text x="867" y="255" text-anchor="middle" class="label">Candidate Gen</text>
  <text x="867" y="277" text-anchor="middle" class="small">retrieve candidates</text>

  <rect x="772" y="318" width="190" height="68" class="box service"/>
  <text x="867" y="345" text-anchor="middle" class="label">Light Ranker</text>
  <text x="867" y="367" text-anchor="middle" class="small">cheap scoring</text>

  <rect x="1012" y="138" width="190" height="68" class="box service"/>
  <text x="1107" y="165" text-anchor="middle" class="label">Feature Service</text>
  <text x="1107" y="187" text-anchor="middle" class="small">batch feature read</text>

  <rect x="1012" y="228" width="190" height="68" class="box ml"/>
  <text x="1107" y="255" text-anchor="middle" class="label">Heavy Ranker</text>
  <text x="1107" y="277" text-anchor="middle" class="small">model inference</text>

  <rect x="1012" y="318" width="190" height="68" class="box service"/>
  <text x="1107" y="345" text-anchor="middle" class="label">Auction</text>
  <text x="1107" y="367" text-anchor="middle" class="small">bid, quality, pacing</text>

  <rect x="1252" y="228" width="170" height="68" class="box service"/>
  <text x="1337" y="255" text-anchor="middle" class="label">Token Service</text>
  <text x="1337" y="277" text-anchor="middle" class="small">signed receipts</text>

