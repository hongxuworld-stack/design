  <path class="arrow" d="M432 213 H482"/>
  <path class="arrow" d="M692 213 H735 V172 H772"/>
  <path class="arrow" d="M692 213 H735 V262 H772"/>
  <path class="arrow" d="M692 213 H735 V352 H772"/>
