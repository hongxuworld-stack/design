  <path class="arrow" d="M1337 296 V445 H147 V251"/>
  <text x="1242" y="435" class="tiny">ranked ads + tracking tokens</text>

  <rect x="70" y="410" width="180" height="62" class="box store"/>
  <text x="160" y="435" text-anchor="middle" class="label">ServingDecision</text>
  <text x="160" y="456" text-anchor="middle" class="small">TTL store</text>

  <rect x="310" y="410" width="180" height="62" class="box store"/>
  <text x="400" y="435" text-anchor="middle" class="label">Campaign Cache</text>
  <text x="400" y="456" text-anchor="middle" class="small">active metadata</text>

  <rect x="550" y="410" width="180" height="62" class="box store"/>
  <text x="640" y="435" text-anchor="middle" class="label">Targeting Index</text>
  <text x="640" y="456" text-anchor="middle" class="small">inverted / search</text>

  <rect x="790" y="410" width="180" height="62" class="box store"/>
  <text x="880" y="435" text-anchor="middle" class="label">Feature Store</text>
  <text x="880" y="456" text-anchor="middle" class="small">online KV</text>

  <rect x="1030" y="410" width="180" height="62" class="box store"/>
  <text x="1120" y="435" text-anchor="middle" class="label">Budget State</text>
  <text x="1120" y="456" text-anchor="middle" class="small">spend + pacing</text>

  <rect x="1270" y="410" width="150" height="62" class="box ml"/>
  <text x="1345" y="435" text-anchor="middle" class="label">Model Server</text>
  <text x="1345" y="456" text-anchor="middle" class="small">pCTR / pCVR</text>

  <path class="arrow dash" d="M1337 296 V392 H160 V410"/>
  <path class="arrow dash" d="M867 138 V110 H400 V410"/>
  <path class="arrow dash" d="M867 296 V395 H640 V410"/>
  <path class="arrow dash" d="M1107 206 V392 H880 V410"/>
  <path class="arrow dash" d="M1107 386 V401 H1120 V410"/>
  <path class="arrow dash" d="M1107 296 V392 H1345 V410"/>

  <rect x="40" y="535" width="1420" height="205" class="group"/>
  <text x="62" y="565" class="section">Event Feedback and Real-Time State</text>

  <rect x="72" y="610" width="170" height="70" class="box event"/>
  <text x="157" y="638" text-anchor="middle" class="label">Event Collector</text>
  <text x="157" y="660" text-anchor="middle" class="small">token validation</text>

  <rect x="302" y="610" width="140" height="70" class="box event"/>
  <text x="372" y="638" text-anchor="middle" class="label">Kafka</text>
  <text x="372" y="660" text-anchor="middle" class="small">event log</text>

  <rect x="502" y="610" width="170" height="70" class="box event"/>
  <text x="587" y="638" text-anchor="middle" class="label">Flink</text>
  <text x="587" y="660" text-anchor="middle" class="small">dedupe, join, agg</text>

  <rect x="732" y="610" width="180" height="70" class="box store"/>
  <text x="822" y="638" text-anchor="middle" class="label">Budget Updates</text>
  <text x="822" y="660" text-anchor="middle" class="small">live spend</text>

  <rect x="972" y="610" width="180" height="70" class="box store"/>
  <text x="1062" y="638" text-anchor="middle" class="label">FreqCap Store</text>
  <text x="1062" y="660" text-anchor="middle" class="small">user/ad windows</text>

  <rect x="1212" y="610" width="180" height="70" class="box store"/>
  <text x="1302" y="638" text-anchor="middle" class="label">Real-Time Features</text>
  <text x="1302" y="660" text-anchor="middle" class="small">recent CTR/actions</text>

