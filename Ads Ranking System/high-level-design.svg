  <path class="arrow dash" d="M822 610 V518 H1120 V472"/>
  <path class="arrow dash" d="M1062 610 V520 H867 V386"/>
  <path class="arrow dash" d="M1302 610 V520 H880 V472"/>
  <path class="arrow dash" d="M147 251 V525 H157 V610"/>
  <text x="165" y="525" class="tiny">impression/click/conversion</text>

  <rect x="40" y="775" width="1420" height="155" class="group"/>
  <text x="62" y="805" class="section">Offline Training and Reporting</text>

  <rect x="170" y="840" width="180" height="62" class="box store"/>
  <text x="260" y="865" text-anchor="middle" class="label">Data Lake</text>
  <text x="260" y="886" text-anchor="middle" class="small">raw + curated events</text>

  <rect x="440" y="840" width="180" height="62" class="box ml"/>
  <text x="530" y="865" text-anchor="middle" class="label">Training Jobs</text>
  <text x="530" y="886" text-anchor="middle" class="small">labels + features</text>

  <rect x="710" y="840" width="180" height="62" class="box ml"/>
  <text x="800" y="865" text-anchor="middle" class="label">Model Registry</text>
  <text x="800" y="886" text-anchor="middle" class="small">versioned models</text>

  <rect x="980" y="840" width="180" height="62" class="box store"/>
  <text x="1070" y="865" text-anchor="middle" class="label">Analytics Store</text>
  <text x="1070" y="886" text-anchor="middle" class="small">Pinot / Druid</text>

  <rect x="1250" y="840" width="150" height="62" class="box service"/>
  <text x="1325" y="865" text-anchor="middle" class="label">Reports</text>
  <text x="1325" y="886" text-anchor="middle" class="small">advertisers</text>

